<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>母亲节快乐 💗</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 60%, #f06292 100%);
  background-attachment: fixed;
  font-family: 'ZCOOL XiaoWei', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
  padding: 20px;
}

/* ===== 浮动爱心 ===== */
.hearts-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.floating-heart {
  position: absolute;
  bottom: -60px;
  font-size: 22px;
  opacity: 0;
  animation: floatUp linear infinite;
  user-select: none;
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.5; }
  100% { transform: translateY(-110vh) rotate(360deg) scale(1.2); opacity: 0; }
}

/* ===== 烟花画布 ===== */
#fireworksCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1001;
}

/* ===== 主卡片 ===== */
.card {
  position: relative;
  z-index: 1;
  width: 92%;
  max-width: 520px;
  background: rgba(255,255,255,0.22);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 36px;
  padding: 40px 28px 36px;
  margin: 20px auto;
  text-align: center;
  box-shadow: 0 20px 60px rgba(233,30,99,0.18),
              0 0 0 1px rgba(255,255,255,0.25);
}

/* ===== 顶部装饰 ===== */
.sub-head {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 22px;
  color: #fff;
  text-shadow: 0 2px 8px rgba(233,30,99,0.35);
  margin-bottom: 4px;
  letter-spacing: 4px;
}

/* ===== 呼吸灯标题 ===== */
.main-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 52px;
  background: linear-gradient(135deg, #ffd54f, #ffb300, #ff8f00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 12px rgba(255,179,0,0.35));
  margin: 6px 0 8px;
  line-height: 1.2;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { filter: drop-shadow(0 4px 12px rgba(255,179,0,0.25)) brightness(1); }
  50%      { filter: drop-shadow(0 4px 28px rgba(255,179,0,0.55)) brightness(1.12); }
}

/* ===== 副标题 ===== */
.subtitle {
  font-size: 17px;
  color: rgba(255,255,255,0.95);
  line-height: 1.7;
  margin: 6px 0 22px;
  letter-spacing: 1px;
}

/* ===== 照片 ===== */
.photo-wrapper {
  width: 160px;
  height: 160px;
  margin: 0 auto 22px;
  position: relative;
}
.photo-frame {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.8);
  box-shadow: 0 8px 32px rgba(233,30,99,0.2);
  overflow: hidden;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s;
}
.photo-frame:hover {
  transform: scale(1.03);
}
.photo-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.photo-placeholder {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  text-align: center;
  line-height: 1.5;
}
.photo-placeholder .icon {
  font-size: 36px;
  display: block;
  margin-bottom: 4px;
}

/* ===== 信件区 ===== */
.letter-section {
  text-align: left;
  padding: 22px 24px;
  margin: 18px 0 24px;
  background: rgba(255,255,255,0.18);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.20);
}
.letter-section p {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 19px;
  color: rgba(255,255,255,0.93);
  line-height: 2;
  letter-spacing: 1px;
  text-indent: 2em;
  margin-bottom: 4px;
}
.letter-section .letter-end {
  text-align: right;
  margin-top: 10px;
  font-size: 18px;
  text-indent: 0;
}

/* ===== 按钮 ===== */
.btn-love {
  display: inline-block;
  padding: 15px 48px;
  background: linear-gradient(135deg, #ff4081, #e91e63);
  color: #fff;
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 21px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(233,30,99,0.35);
  transition: all 0.3s;
  letter-spacing: 2px;
  position: relative;
  overflow: hidden;
}
.btn-love::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
}
.btn-love:hover::after {
  opacity: 1;
}
.btn-love:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 10px 36px rgba(233,30,99,0.45);
}
.btn-love:active {
  transform: scale(0.96);
}
.btn-love:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none !important;
}

/* ===== 提示文字 ===== */
.hint-text {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-top: 14px;
  letter-spacing: 1px;
}

/* ===== 响应式 ===== */
@media (max-width: 480px) {
  .card { padding: 28px 18px 24px; margin: 10px auto; }
  .main-title { font-size: 38px; }
  .sub-head { font-size: 18px; }
  .subtitle { font-size: 15px; }
  .photo-wrapper { width: 130px; height: 130px; }
  .btn-love { padding: 13px 34px; font-size: 18px; }
  .letter-section p { font-size: 17px; }
}

@media (max-width: 360px) {
  .main-title { font-size: 32px; }
  .card { padding: 22px 14px 18px; }
  .photo-wrapper { width: 110px; height: 110px; }
}
</style>
</head>
<body>

<!-- 浮动爱心 -->
<div class="hearts-container" id="heartsContainer"></div>

<!-- 烟花画布 -->
<canvas id="fireworksCanvas"></canvas>

<!-- 主卡片 -->
<div class="card">

  <div class="sub-head">✨ 妈妈，母亲节快乐 ✨</div>
  <h1 class="main-title">妈妈，我爱你</h1>
  <p class="subtitle">感谢你不是超人，却为我变成了万能。</p>

  <!-- 照片 -->
  <div class="photo-wrapper">
    <div class="photo-frame" id="photoFrame">
      <img id="familyPhoto"
           src="526da19e92d7fa5a5bead1c8d4ffaa60.jpg"
           alt="和妈妈的合影"
           onerror="this.style.display='none';document.getElementById('photoPlaceholder').style.display='block'">
      <div class="photo-placeholder" id="photoPlaceholder" style="display:none;">
        <span class="icon">📷</span>
        在此处放入<br>你和妈妈的合影
      </div>
    </div>
  </div>

  <!-- 感谢信 -->
  <div class="letter-section">
    <p>妈妈，谢谢你多年的养育之恩，你辛苦了。</p>
    <p>愿你永远年轻，身体健康，笑口常开。</p>
    <p class="letter-end">—— 爱你的孩子</p>
  </div>

  <!-- 按钮 -->
  <button class="btn-love" id="btnLove">💗 点击收下我的爱</button>
  <div class="hint-text">点击按钮，为她放一场漫天烟花</div>

</div>

<script>
// ============================================================
// 1. 浮动爱心
// ============================================================
(function() {
  const container = document.getElementById('heartsContainer');
  const emojis = ['❤️', '🌸', '💗', '💕', '🌷', '✨', '💖', '🌺'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'floating-heart';
    el.textContent = emojis[i % emojis.length];
    el.style.left = (Math.random() * 94 + 3) + '%';
    el.style.fontSize = (Math.random() * 18 + 14) + 'px';
    el.style.animationDuration = (Math.random() * 8 + 8) + 's';
    el.style.animationDelay = (Math.random() * 16) + 's';
    container.appendChild(el);
  }
})();

// ============================================================
// 2. 满屏烟花 🎆
// ============================================================
(function() {
  const canvas = document.getElementById('fireworksCanvas');
  const ctx = canvas.getContext('2d');
  let rockets = [];
  let particles = [];
  let animating = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // 颜色调色板
  const palettes = [
    ['#ff4081','#e91e63','#f50057','#ff8a80','#ff80ab'],
    ['#ffd54f','#ffb300','#ff8f00','#ffe082','#fff9c4'],
    ['#7c4dff','#536dfe','#b388ff','#8c9eff','#e040fb'],
    ['#00e676','#69f0ae','#b9f6ca','#1de9b6','#00bfa5'],
    ['#ff6d00','#ff9100','#ffab40','#ffd180','#ffe57f'],
    ['#40c4ff','#00b0ff','#80d8ff','#0091ea','#01579b'],
    ['#ff1744','#d50000','#ff5252','#ff8a80','#ff9e80'],
    ['#fce4ec','#f8bbd0','#f48fb1','#f06292','#ec407a'],
    ['#fff8e1','#ffecb3','#ffe082','#ffd54f','#ffca28'],
    ['#e040fb','#d500f9','#ea80fc','#ce93d8','#ba68c8']
  ];

  // 发射一枚火箭
  function launchRocket() {
    const x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
    const targetY = Math.random() * canvas.height * 0.4 + canvas.height * 0.1;
    const speed = Math.random() * 4 + 6;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.4;
    const palette = palettes[Math.floor(Math.random() * palettes.length)];

    rockets.push({
      x, y: canvas.height + 20,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      targetY,
      trail: [],
      palette,
      done: false
    });
  }

  // 火箭爆炸生成粒子
  function explode(rocket, count) {
    const colors = rocket.palette;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 8 + 2;
      const color = colors[Math.floor(Math.random() * colors.length)];
      particles.push({
        x: rocket.x,
        y: rocket.y,
        vx: Math.cos(angle) * speed * (0.3 + Math.random() * 0.7),
        vy: Math.sin(angle) * speed * (0.3 + Math.random() * 0.7),
        size: Math.random() * 4 + 2,
        color,
        life: 1,
        decay: Math.random() * 0.015 + 0.008,
        gravity: 0.06 + Math.random() * 0.04,
        shape: Math.random() > 0.5 ? 'circle' : 'star'
      });
    }
  }

  // 生成星形路径
  function drawStar(ctx, x, y, size) {
    const s = size * 0.35;
    ctx.beginPath();
    ctx.moveTo(x, y - size);
    ctx.lineTo(x + s, y - s);
    ctx.lineTo(x + size, y);
    ctx.lineTo(x + s, y + s);
    ctx.lineTo(x, y + size);
    ctx.lineTo(x - s, y + s);
    ctx.lineTo(x - size, y);
    ctx.lineTo(x - s, y - s);
    ctx.closePath();
    ctx.fill();
  }

  function animate() {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 更新火箭
    for (let i = rockets.length - 1; i >= 0; i--) {
      const r = rockets[i];
      r.x += r.vx;
      r.y += r.vy;
      r.vy += 0.04; // 重力

      // 拖尾
      r.trail.push({ x: r.x, y: r.y });
      if (r.trail.length > 12) r.trail.shift();

      if (r.vy >= 0 || r.y <= r.targetY) {
        // 爆炸
        const count = 80 + Math.floor(Math.random() * 60);
        explode(r, count);
        rockets.splice(i, 1);
      }
    }

    // 绘制火箭拖尾
    for (const r of rockets) {
      for (let j = 0; j < r.trail.length; j++) {
        const alpha = j / r.trail.length * 0.8;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(r.trail[j].x, r.trail[j].y, 2 * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(r.x, r.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // 更新粒子
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.vy += p.gravity;
      p.y += p.vy;
      p.vx *= 0.99;
      p.vy *= 0.99;
      p.life -= p.decay;

      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }

      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;

      if (p.shape === 'star') {
        drawStar(ctx, p.x, p.y, p.size * p.life);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.globalAlpha = 1;

    // 继续动画
    if (rockets.length > 0 || particles.length > 0) {
      requestAnimationFrame(animate);
    } else {
      animating = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  // 外部调用接口
  window.fireMotherLove = function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    rockets = [];
    particles = [];

    // 连续发射多枚火箭
    const totalRockets = 18 + Math.floor(Math.random() * 8);
    for (let i = 0; i < totalRockets; i++) {
      setTimeout(launchRocket, i * 60 + Math.random() * 80);
    }

    if (!animating) {
      animating = true;
      setTimeout(() => { animate(); }, 50);
    }
  };
})();

// ============================================================
// 3. 按钮点击
// ============================================================
document.getElementById('btnLove').addEventListener('click', function() {
  const btn = this;
  btn.disabled = true;
  btn.textContent = '🎆 正在绽放...';

  // 触发烟花
  window.fireMotherLove();

  // 连续放三轮烟花
  setTimeout(() => window.fireMotherLove(), 1200);
  setTimeout(() => window.fireMotherLove(), 2500);

  // 恢复按钮
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = '💗 点击收下我的爱';
  }, 5000);
});
</script>

</body>
</html>
